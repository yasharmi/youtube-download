name: Download YouTube Videos

on:
  push:
    paths: ["videos.json"]
  workflow_dispatch:

concurrency:
  group: youtube-download
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install QuickJS
        run: |
          # Install QuickJS properly so it's recognized as 'quickjs'
          sudo apt-get update
          sudo apt-get install -y quickjs
          
          # Create symlink if needed
          if ! command -v quickjs &> /dev/null; then
            echo "Creating symlink for quickjs"
            sudo ln -s $(which qjs) /usr/local/bin/quickjs 2>/dev/null || true
          fi
          
          # Verify installation
          echo "Checking installations:"
          which qjs && qjs --version
          which quickjs && quickjs --version || echo "quickjs symlink not created"
          
          # Show what yt-dlp sees
          echo "Testing yt-dlp runtime detection..."
          yt-dlp --list-runtimes 2>&1 | grep -i quick || true

      - name: Install yt-dlp
        run: |
          pip install --upgrade yt-dlp
          yt-dlp --version

      - name: Write cookies file
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          if [ -n "$YOUTUBE_COOKIES" ]; then
            # Ensure cookies file is in Netscape format
            echo "$YOUTUBE_COOKIES" > /tmp/yt-cookies.txt
            echo "COOKIES_FILE=/tmp/yt-cookies.txt" >> $GITHUB_ENV
            echo "Cookies file configured"
            # Verify cookies file exists
            ls -la /tmp/yt-cookies.txt
          else
            echo "No cookies provided - downloads may be limited"
          fi

      - name: Test yt-dlp with QuickJS
        run: |
          # Test with a public video to verify setup
          echo "Testing yt-dlp with QuickJS runtime..."
          yt-dlp --js-runtimes quickjs --simulate \
            --extractor-args "youtube:player_client=web" \
            "https://www.youtube.com/watch?v=jNQXAC9IVRw"
          echo "Test successful"

      - name: Process pending videos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python scripts/process.py

      - name: Commit updated videos.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add videos.json
          git diff --staged --quiet || \
            git commit -m "chore: update download statuses [skip ci]" && \
            git push